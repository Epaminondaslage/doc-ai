<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DocAI - Biblioteca Técnica</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>


<!-- ===== CONTAINER PRINCIPAL ===== -->

<div class="container">


    <!-- ===== LOGO ===== -->

    <div class="logo">
        <img src="img/logo.jpg" alt="DocAI">
    </div>


    <!-- ===== CAMPO DE BUSCA ===== -->

    <div class="search-box">

        <input 
            id="query"
            type="text"
            placeholder="Pesquisar na biblioteca técnica..."
            autocomplete="off"
        >

        <button onclick="search()">
            Pesquisar
        </button>

    </div>


    <!-- ===== AUTOCOMPLETE ===== -->

    <div id="autocomplete"></div>


    <!-- ===== RESULTADOS ===== -->

    <div id="results"></div>


</div>



<!-- ===== RODAPÉ ===== -->

<footer>

<div class="footer">

DocAI • Motor de busca de documentos técnicos  
<br>
Biblioteca indexada localmente

<br><br>

<div id="stats">
Carregando estatísticas...
</div>

</div>

</footer>


<!-- ===== JAVASCRIPT ===== -->

<script src="js/app.js"></script>

</body>
</html>
